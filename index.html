<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠팡 로켓배송 사무용품 신청 페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0052cc;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-[1400px] mx-auto">
        <header class="mb-8 text-center md:text-left">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">
                <span class="text-blue-600">Coupang</span> 사무용품 신청 현황
            </h1>
            <p class="text-gray-600">신청된 상품 목록을 확인하고 관리하는 대시보드입니다. <strong>상품 추가는 전용 크롬 확장 프로그램을 이용해주세요.</strong></p>
            
            <div class="mt-3">
                <a href="https://www.coupang.com/" target="_blank" class="inline-flex items-center text-blue-600 hover:text-blue-800 font-medium transition underline decoration-blue-300 underline-offset-4 hover:decoration-blue-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                    </svg>
                    쿠팡 홈페이지 바로가기
                </a>
            </div>
        </header>

        <!-- Action Bar -->
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold text-gray-800">신청 목록 <span id="countBadge" class="bg-gray-200 text-gray-700 text-sm px-2 py-0.5 rounded-full ml-2">0</span></h2>
            <div class="flex gap-2">
                <button onclick="clearList()" class="px-4 py-2 text-red-500 hover:bg-red-50 rounded-lg transition text-sm border border-transparent hover:border-red-100">전체 삭제</button>
                <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white font-medium px-4 py-2 rounded-lg transition shadow-sm flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    엑셀 다운로드
                </button>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200 mb-8">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 text-sm border-b border-gray-200 whitespace-nowrap">
                            <th class="p-4 font-medium w-32 bg-blue-50 text-blue-800">신청자</th>
                            <th class="p-4 font-medium w-28">상품코드</th>
                            <th class="p-4 font-medium min-w-[200px]">상품명 (수정가능)</th>
                            <th class="p-4 font-medium w-64 bg-indigo-50 text-indigo-800">옵션선택/입력</th>
                            <th class="p-4 font-medium w-24">비고</th>
                            <th class="p-4 font-medium w-20 min-w-[5rem]">수량</th>
                            <th class="p-4 font-medium w-28">단가</th>
                            <th class="p-4 font-medium w-28 text-right">합계</th>
                            <th class="p-4 font-medium w-32 text-center text-gray-500">추가일시</th>
                            <th class="p-4 font-medium w-16 text-center">삭제</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody" class="text-sm divide-y divide-gray-100">
                        <tr id="emptyState">
                            <td colspan="10" class="p-8 text-center text-gray-400">
                                데이터 연결 대기 중...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Total Footer -->
            <div class="bg-gray-50 p-4 border-t border-gray-200 flex justify-end items-center gap-4">
                <span class="text-gray-600 font-medium">총 합계금액:</span>
                <span class="text-2xl font-bold text-blue-600" id="grandTotal">0원</span>
            </div>
        </div>
    </div>

    <!-- Firebase SDK Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, updateDoc, onSnapshot, getDocs, writeBatch, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // =================================================================================
        // [필수] 구글 클라우드 콘솔에서 복사한 API Key를 아래 따옴표 안에 넣어주세요!
        // =================================================================================
        
        let firebaseConfig = {
           apiKey: "AIzaSyAqf9h1kgRCjjzGzgiGgo2Q6FQEZ28zdjc",
           authDomain: "alphacrawler-51ef3.firebaseapp.com",
           projectId: "alphacrawler-51ef3",
           storageBucket: "alphacrawler-51ef3.firebasestorage.app",
           messagingSenderId: "854370361421",
           appId: "1:854370361421:web:7e966adb11ddc4304ffc04",
           measurementId: "G-V4GVSCQ2MF"
        };

        if (typeof __firebase_config !== 'undefined' && __firebase_config.trim() !== '') {
            try {
                firebaseConfig = JSON.parse(__firebase_config);
            } catch(e) { console.warn("Config parsing error"); }
        } else {
            if (!firebaseConfig.apiKey) {
                alert("⚠️ [설정 오류]\n\nFirebase API Key가 비어있습니다. 소스 코드를 확인해주세요.");
            }
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'coupang-tool-v1';
        
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Init Error", e);
        }
        
        let unsubscribeSnapshot = null;
        // 컬렉션 이름 변경 (데이터 분리)
        const collectionName = 'coupang_cart_items';

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth error:", e);
            }
        };
        if(auth) initAuth();

        if(auth) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    setupRealtimeListener(user);
                }
            });
        }

        function setupRealtimeListener(user) {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', collectionName);

            unsubscribeSnapshot = onSnapshot(colRef, (snapshot) => {
                const items = [];
                snapshot.forEach(doc => {
                    items.push({ id: doc.id, ...doc.data() });
                });
                
                // 생성 시간순 정렬
                items.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
                
                renderTable(items);
            }, (error) => {
                console.error("Data sync error:", error);
                if (error.code === 'permission-denied') {
                    alert("데이터 접근 권한 오류. 파이어베이스 규칙을 확인하세요.");
                }
            });
        }

        window.handleEnter = function(e) { if (e.key === 'Enter') window.fetchProductInfo(); }
        function cleanText(text) { return text ? text.replace(/\s+/g, ' ').trim() : ""; }
        
        function formatDate(timestamp) {
            if (!timestamp) return "-";
            const date = new Date(timestamp);
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            const hh = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            return `${mm}.${dd}. ${hh}:${min}`;
        }

        function renderTable(items) {
            const tableBody = document.getElementById('productTableBody');
            tableBody.innerHTML = ''; 

            if (items.length === 0) {
                tableBody.innerHTML = `
                    <tr id="emptyState">
                        <td colspan="10" class="p-8 text-center text-gray-400">
                            등록된 상품이 없습니다. 신청자명과 쿠팡 URL을 입력하여 추가해주세요.
                        </td>
                    </tr>
                `;
                updateGrandTotal([]);
                document.getElementById('countBadge').innerText = 0;
                return;
            }

            items.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 group border-b border-gray-100 transition";
                
                const lineTotal = parseInt(item.price || 0) * parseInt(item.qty || 0);

                // --- 옵션 렌더링 로직 (쿠팡은 텍스트 입력과 드롭다운 혼합지원) ---
                let optionHtml = '';
                if (item.optionList && item.optionList.length > 0) {
                    optionHtml = `<select class="w-full bg-indigo-50 border border-indigo-200 text-indigo-800 text-sm rounded p-1 outline-none focus:border-indigo-500" onchange="window.updateItem('${item.id}', 'option', this.value)">`;
                    let hasSelected = false;
                    item.optionList.forEach(opt => {
                        const isSelected = item.option === opt ? 'selected' : '';
                        if(isSelected) hasSelected = true;
                        optionHtml += `<option value="${opt}" ${isSelected}>${opt}</option>`;
                    });
                    if(!hasSelected && !item.option) {
                         optionHtml = `<option value="" selected disabled>옵션을 선택하세요</option>` + optionHtml;
                    } else if (!hasSelected && item.option) {
                        optionHtml += `<option value="${item.option}" selected>${item.option} (목록없음)</option>`;
                    }
                    optionHtml += `</select>`;
                } else {
                    // 옵션 파싱이 안되었을 경우 사용자가 직접 입력할 수 있도록 텍스트 박스 제공
                    optionHtml = `<input type="text" value="${item.option || ''}" placeholder="옵션 직접입력" class="w-full bg-transparent border-b border-gray-300 focus:border-indigo-500 outline-none text-indigo-800 text-sm p-1 transition-colors" onchange="window.updateItem('${item.id}', 'option', this.value)">`;
                }

                // 상품명이 직접 입력되어야 할 경우 하이라이트 표시
                const nameInputClass = item.name && item.name !== "클릭하여 상품명 입력" 
                    ? "w-full bg-transparent border-b border-transparent focus:border-blue-500 outline-none font-medium text-gray-800 truncate transition-colors"
                    : "w-full bg-red-50 border-b border-red-300 focus:border-red-500 outline-none font-medium text-red-600 truncate transition-colors px-1";

                tr.innerHTML = `
                    <td class="p-4">
                        <input type="text" value="${item.applicant}" readonly class="w-full bg-transparent border-none outline-none text-gray-800 font-bold bg-blue-50 text-center rounded px-1 cursor-default">
                    </td>
                    <td class="p-4"><input type="text" value="${item.code}" readonly class="w-full bg-transparent border-none outline-none text-gray-700 cursor-default text-xs"></td>
                    
                    <!-- 상품명 열 (수동 입력 가능하도록 변경) -->
                    <td class="p-4"><input type="text" value="${item.name}" placeholder="상품명 직접 입력" class="${nameInputClass}" onchange="window.updateItem('${item.id}', 'name', this.value)"></td>
                    
                    <!-- 옵션 열 -->
                    <td class="p-4">
                        ${optionHtml}
                    </td>

                    <!-- 비고 열 (Text Input) -->
                    <td class="p-4">
                        <input type="text" value="${item.remarks || ''}" placeholder="메모" class="w-full bg-transparent border-b border-transparent focus:border-blue-500 outline-none text-gray-600 text-sm transition-colors" onchange="window.updateItem('${item.id}', 'remarks', this.value)">
                    </td>
                    
                    <td class="p-4"><input type="number" min="1" value="${item.qty}" class="qty-input w-full px-2 py-1 border border-gray-300 rounded focus:border-blue-500 outline-none text-center" onchange="window.updateItem('${item.id}', 'qty', this.value)"></td>
                    <td class="p-4">
                        <input type="text" value="${parseInt(item.price || 0).toLocaleString()}" class="price-input w-full bg-transparent border-b border-transparent focus:border-blue-500 outline-none text-right pr-2 transition-colors" onchange="window.updateItem('${item.id}', 'price', this.value)">
                    </td>
                    <td class="p-4 text-right font-medium text-gray-700 line-total">${lineTotal.toLocaleString()}</td>
                    
                    <td class="p-4 text-center text-xs text-gray-400 whitespace-nowrap">
                        ${formatDate(item.createdAt)}
                    </td>
                    
                    <td class="hidden"><input type="hidden" class="link-input" value="${item.url || ''}"></td>

                    <td class="p-4 text-center">
                        <button onclick="window.deleteItem('${item.id}')" class="text-gray-400 hover:text-red-500 transition p-1" title="삭제">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            updateGrandTotal(items);
            document.getElementById('countBadge').innerText = items.length;
        }

        function updateGrandTotal(items) {
            let total = 0;
            items.forEach(item => {
                const price = parseInt(item.price || 0);
                const qty = parseInt(item.qty || 0);
                total += price * qty;
            });
            document.getElementById('grandTotal').innerText = total.toLocaleString() + '원';
        }

        window.updateItem = async function(docId, field, value) {
            if (!auth || !auth.currentUser) await signInAnonymously(auth);
            
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', collectionName, docId);
            let finalValue = value;
            if (field === 'price') finalValue = value.replace(/,/g, '');
            
            try {
                await updateDoc(docRef, { [field]: finalValue });
            } catch (e) {
                console.error("Update failed", e);
            }
        };

        window.deleteItem = async function(docId) {
            if (!auth || !auth.currentUser) await signInAnonymously(auth);
            if(!confirm('삭제하시겠습니까?')) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', collectionName, docId);
            await deleteDoc(docRef);
        };

        window.clearList = async function() {
            if (!auth || !auth.currentUser) await signInAnonymously(auth);
            if(!confirm('모든 리스트를 삭제하시겠습니까? (다른 사용자의 데이터도 삭제됩니다)')) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', collectionName);
            const snapshot = await getDocs(colRef);
            const batch = writeBatch(db);
            snapshot.docs.forEach((doc) => {
                batch.delete(doc.ref);
            });
            await batch.commit();
        };

        window.exportToExcel = function() {
            try {
                if (typeof XLSX === 'undefined') {
                    alert('엑셀 라이브러리 로딩 중입니다.');
                    return;
                }
                const rows = document.querySelectorAll('#productTableBody tr:not(#emptyState)');
                if (rows.length === 0) { 
                    alert('내보낼 데이터가 없습니다.'); 
                    return; 
                }
                
                const data = [["신청자", "상품코드", "상품명", "옵션", "비고", "수량", "단가", "합계금액", "추가일시", "상품링크"]];
                let total = 0;

                rows.forEach(row => {
                    const inputs = row.querySelectorAll('input');
                    const select = row.querySelector('select');
                    
                    const applicant = inputs[0].value;
                    const code = inputs[1].value;
                    const name = inputs[2].value;
                    
                    let optionVal = "";
                    if (select) {
                        optionVal = select.value;
                    } else {
                        // 옵션이 직접 입력 텍스트인 경우
                        const optionInput = row.querySelectorAll('input')[3]; // 옵션은 4번째 input
                        if (optionInput && optionInput.placeholder.includes("옵션")) {
                            optionVal = optionInput.value;
                        } else {
                            const optionText = row.children[3].innerText.trim();
                            optionVal = optionText === '-' ? '' : optionText;
                        }
                    }

                    // 비고 input 인덱스는 옵션이 input인지에 따라 달라질 수 있음. name 기반이 안전하나 순서에 의존
                    const remarksIndex = select ? 3 : 4; 
                    const remarks = inputs[remarksIndex].value; 
                    const qty = parseInt(inputs[remarksIndex+1].value) || 0;
                    const price = parseInt(inputs[remarksIndex+2].value.replace(/,/g, '')) || 0;
                    const link = row.querySelector('.link-input')?.value || "";
                    const dateText = row.children[8].innerText.trim();
                    
                    const sum = price * qty;
                    total += sum;
                    
                    data.push([applicant, code, name, optionVal, remarks, qty, price, sum, dateText, link]);
                });
                
                data.push(["", "", "총 합계", "", "", "", "", total, "", ""]);

                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(data);
                
                ws['!cols'] = [
                    { wch: 15 }, { wch: 15 }, { wch: 40 }, { wch: 25 }, { wch: 20 },
                    { wch: 8 }, { wch: 12 }, { wch: 15 }, { wch: 20 }, { wch: 50 }
                ];
                
                XLSX.utils.book_append_sheet(wb, ws, "공동구매리스트");
                const now = new Date();
                const dateStr = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}`;
                XLSX.writeFile(wb, `쿠팡_공구리스트_${dateStr}.xlsx`);
            } catch (error) {
                console.error('Export Error:', error);
                alert('엑셀 파일 생성 중 오류가 발생했습니다.');
            }
        };
    </script>
</body>
</html>
